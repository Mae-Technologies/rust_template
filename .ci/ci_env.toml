# CI test runner configuration
#
# env entries support two forms:
#   KEY=VALUE              — exported as-is (local dev + CI)
#   KEY=${{ secrets.NAME }} — resolved from GitHub secrets in CI only; blank locally (raises if secret missing)
#
# Service-specific secrets (set per-repo): use ${{ secrets.YOUR_SECRET_NAME }}
# Global/org secrets (redis, rabbitmq): add as KEY=VALUE in your workflow env block

coverage_threshold = 45

engine = "nextest"
env = [
  "MAE_TESTCONTAINERS=1",
  "APP_DATABASE__HOST=",
  "APP_GRAPHDB__HOST="
]
flags = ["--no-pager", "--features", "integration-testing", "--all-features", "--run-ignored", "all"]
