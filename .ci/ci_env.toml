# CI test runner configuration
#
# Supported engines: "miri", "cargo", "nextest", "nothing"
# Environment variables in `env` are exported before test command runs.
# `flags` are appended to the selected test command.

coverage_threshold = 45

engine = "nextest"
env = ["MAE_TESTCONTAINERS=1"]
flags = ["--no-pager", "--all-features", "--run-ignored", "all", "--no-tests=warn"]
